const Badge = ({ children, v="gray", xs }) => {
  const s = {
    teal:{bg:"#C9F5EC",c:"#0A5E52"}, blue:{bg:"#DBEAFE",c:"#1E3A8A"},
    green:{bg:"#D1FAE5",c:"#064E3B"}, amber:{bg:"#FEF3C7",c:"#78350F"},
    red:{bg:"#FEE2E2",c:"#7F1D1D"}, purple:{bg:"#EDE9FE",c:"#4C1D95"},
    gray:{bg:"#F3F4F6",c:"#1F2937"}, peach:{bg:"#FFEDD5",c:"#9A3412"},
  }[v]||{bg:"#F3F4F6",c:"#1F2937"};
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,borderRadius:99,fontWeight:800,whiteSpace:"nowrap",fontSize:xs?11:13,padding:xs?"3px 8px":"4px 11px",background:s.bg,color:s.c,border:`1px solid ${s.c}25`}}>{children}</span>;

const RiskBadge = ({level}) => {
  const m={urgent:["red","🔴 Urgent"],elevated:["amber","⚠ Elevated"],routine:["green","✓ Routine"],low:["green","✓ Low"]};
  const [vr,label]=m[level]||["gray",level];
  return <Badge v={vr}>{label}</Badge>;
};

const StatusBadge = ({status}) => {
  const m={triaged:"blue",pending:"amber",scheduled:"teal",active:"green",closed:"gray",confirmed:"teal"};
  const l={triaged:"Triaged",pending:"Pending consent",scheduled:"Scheduled",active:"Active care",closed:"Closed",confirmed:"Confirmed"};
  return <Badge v={m[status]||"gray"}>{l[status]||status}</Badge>;
};

const Btn = ({children,onClick,v="sec",sz="md",full,disabled}) => {
  const [hov,setHov]=useState(false);
  const [prs,setPrs]=useState(false);
  const cfg={
    pri:{bg:"#0C7A6A",bgH:"#0A6658",bgP:"#085549",c:"#FFF",bdr:"transparent",sh:"0 2px 8px rgba(12,122,106,.30)"},
    sec:{bg:"#FFF",bgH:"#EDFAF6",bgP:"#C9F5EC",c:"#111827",bdr:"#C8D9E0",sh:"0 1px 3px rgba(0,0,0,.08)"},
    blue:{bg:"#1D4ED8",bgH:"#1A45BF",bgP:"#173AB0",c:"#FFF",bdr:"transparent",sh:"0 2px 8px rgba(29,78,216,.28)"},
    red:{bg:"#FEE2E2",bgH:"#FECACA",bgP:"#FCA5A5",c:"#7F1D1D",bdr:"#FCA5A5",sh:"none"},
    ghost:{bg:"transparent",bgH:"#EDFAF6",bgP:"#C9F5EC",c:"#0C7A6A",bdr:"transparent",sh:"none"},
    purple:{bg:"#5B21B6",bgH:"#4C1D95",bgP:"#3B0E8C",c:"#FFF",bdr:"transparent",sh:"0 2px 8px rgba(91,33,182,.28)"},
    amber:{bg:"#FEF3C7",bgH:"#FDE68A",bgP:"#FCD34D",c:"#78350F",bdr:"#FCD34D",sh:"none"},
  };
  const c=cfg[v]||cfg.sec;
  const bg=prs?c.bgP:hov?c.bgH:c.bg;
  const pad={sm:"8px 16px",md:"11px 22px",lg:"14px 28px"}[sz]||"11px 22px";
  const fs={sm:13,md:15,lg:16}[sz]||15;
  return (
    <button onClick={disabled?undefined:onClick} disabled={!!disabled}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>{setHov(false);setPrs(false)}}
      onMouseDown={()=>setPrs(true)} onMouseUp={()=>setPrs(false)}
      style={{display:"inline-flex",alignItems:"center",gap:7,padding:pad,borderRadius:"var(--r-sm)",fontSize:fs,fontWeight:700,fontFamily:"inherit",cursor:disabled?"not-allowed":"pointer",border:`2px solid ${c.bdr==="transparent"?"transparent":c.bdr}`,background:bg,color:c.c,opacity:disabled?.5:1,transition:"background .14s, transform .1s",transform:prs?"scale(.97)":hov?"scale(1.01)":"scale(1)",boxShadow:hov&&!prs?c.sh:"none",width:full?"100%":undefined,justifyContent:full?"center":undefined,whiteSpace:"nowrap",userSelect:"none",minHeight:44}}>

const Card = ({children,sx={},accent,onClick}) => {
  const [h,setH]=useState(false);
  return (
    <div onClick={onClick} role={onClick?"button":undefined} tabIndex={onClick?0:undefined}
      onMouseEnter={()=>onClick&&setH(true)} onMouseLeave={()=>setH(false)}

      {children}
    </div>
  );
};

      const done=i<cur,active=i===cur;
      return (
        <div key={s} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",position:"relative"}}>
          {i<steps.length-1&&<div style={{position:"absolute",left:"50%",top:17,width:"100%",height:2,background:done?"var(--teal)":"var(--bdr)",zIndex:0}}/>}

  </button>

const JournalPage = () => {

// PAGE: CSSRS SCREENING
// ══════════════════════════════════════════════════════════
const CSSRSPage = () => {
  const [answers,setAnswers]=useState({});
  const [submitted,setSubmitted]=useState(false);
  const [youth,setYouth]=useState("A.M.");

  const totalScore = Object.values(answers).filter(Boolean).length;
  const riskLevel = totalScore>=5?"Imminent Risk":totalScore>=3?"High Risk":totalScore>=1?"Elevated Risk":"Low / Baseline Risk";
  const riskColor = totalScore>=5?"#B91C1C":totalScore>=3?"#B91C1C":totalScore>=1?"#92400E":"#047857";

  if(submitted) return (
    <div className="pg" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:440}}>
      <Card sx={{maxWidth:540,textAlign:"center",padding:"48px 44px"}}>
        <div style={{fontSize:50,marginBottom:18}}>{totalScore>=3?"🚨":"📋"}</div>
        <h2 style={{fontSize:24,fontWeight:900,marginBottom:10}}>Screening Complete</h2>
        <div style={{marginBottom:16}}><Badge v={totalScore>=3?"red":totalScore>=1?"amber":"green"}>Total Score: {totalScore} / 6 — {riskLevel}</Badge></div>
        {totalScore>=3&&<Alert type="danger"><strong>High risk detected.</strong> This screening result requires immediate clinical review by a licensed provider. Do not leave this youth alone. Contact emergency services if needed: <strong>988</strong> or <strong>911</strong>.</Alert>}
        {totalScore>0&&totalScore<3&&<Alert type="warning"><strong>Elevated risk indicators present.</strong> A licensed clinician should follow up with this youth within 24–48 hours. Document in clinical record.</Alert>}
        {totalScore===0&&<Alert type="success"><strong>No current suicidal ideation reported.</strong> Continue routine monitoring. Re-screen at next contact or sooner if clinical status changes.</Alert>}
        <div style={{marginTop:20,padding:14,borderRadius:"var(--r-sm)",background:"var(--bg2)",border:"1px solid var(--bdr)",textAlign:"left"}}>
          <div style={{fontSize:12,fontWeight:800,textTransform:"uppercase",letterSpacing:".07em",color:"var(--tx5)",marginBottom:8}}>Screening record</div>
          <div style={{fontSize:13.5,color:"var(--tx3)"}}>Youth: <strong>{youth}</strong></div>
          <div style={{fontSize:13.5,color:"var(--tx3)"}}>Date: <strong>May 21, 2025</strong></div>
          <div style={{fontSize:13.5,color:"var(--tx3)"}}>Administered by: <strong>Dr. Marcus Williams, LPC</strong></div>
          <div style={{fontSize:13.5,color:"var(--tx3)"}}>Score: <strong style={{color:riskColor}}>{totalScore}/6 — {riskLevel}</strong></div>
        </div>
        <div style={{height:18}}/>
        <div style={{display:"flex",gap:9,justifyContent:"center"}}>
          <Btn v="pri" onClick={()=>{setAnswers({});setSubmitted(false);}}>Screen another youth</Btn>
          <Btn v="sec">Export to EHR</Btn>
        </div>
      </Card>
    </div>
  );

  return (
    <div className="pg">
      <EW>Clinical Screening Tool — Licensed Professionals Only</EW>
      <h1 style={{fontSize:28,fontWeight:900,marginBottom:6}}>🧪 Columbia Suicide Severity Rating Scale (C-SSRS)</h1>
      <p style={{fontSize:15,color:"var(--tx4)",marginBottom:18}}>The C-SSRS is a validated, evidence-based suicide risk assessment tool. This screening must be administered by a licensed mental health professional. Results are automatically documented in the referral record and can be exported to EHR systems.</p>

      <Alert type="danger" style={{marginBottom:18}}>
        <strong>For licensed professional use only.</strong> This is not a self-assessment tool. If you are a youth in crisis, please call <strong>988</strong> or text HOME to <strong>741741</strong> immediately.
      </Alert>

      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:22}}>
        <div>
          <Card sx={{marginBottom:18}}>
            <h2 style={{fontSize:16,fontWeight:800,marginBottom:14,paddingBottom:12,borderBottom:"1px solid var(--bdr-lt)"}}>👤 Youth being screened</h2>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={{display:"block",fontSize:13.5,fontWeight:700,color:"var(--tx3)",marginBottom:5}}>Youth name / ID</label>
                <select value={youth} onChange={e=>setYouth(e.target.value)} style={iSt} onFocus={iFoc} onBlur={iBlr}>
                  {REFERRALS.filter(r=>r.status!=="closed").map(r=><option key={r.id} value={r.name}>{r.name} — {r.id}</option>)}
                </select>
              </div>
              <div><label style={{display:"block",fontSize:13.5,fontWeight:700,color:"var(--tx3)",marginBottom:5}}>Date of screening</label><input type="date" defaultValue="2025-05-21" style={iSt} onFocus={iFoc} onBlur={iBlr}/></div>
            </div>
          </Card>

          <Card>
            <h2 style={{fontSize:16,fontWeight:800,marginBottom:5}}>📋 C-SSRS Questions</h2>
            <p style={{fontSize:13.5,color:"var(--tx4)",marginBottom:18}}>Ask each question directly. Mark "Yes" only if the youth endorses the item in the past 30 days (or as clinically indicated).</p>
            {CSSRS_QUESTIONS.map((q,i)=>(
              <div key={q.id} style={{padding:"16px 18px",borderRadius:"var(--r)",border:`2px solid ${answers[q.id]?"#B91C1C":"var(--bdr)"}`,background:answers[q.id]?"#FFF5F5":"white",marginBottom:12,transition:"all .15s"}}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:14}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
                      <Badge v={q.severity>=5?"red":q.severity>=3?"amber":"gray"} xs>Severity {q.severity}</Badge>
                      <span style={{fontSize:11.5,fontWeight:700,color:"var(--tx5)"}}>{q.category} · {q.label}</span>
                    </div>
                    <p style={{fontSize:14.5,color:"var(--tx2)",lineHeight:1.5,fontWeight:500}}>{q.text}</p>
                  </div>
                  <div style={{display:"flex",gap:8,flexShrink:0}}>
                    <button onClick={()=>setAnswers(a=>({...a,[q.id]:true}))} style={{padding:"8px 16px",borderRadius:"var(--r-sm)",border:`2px solid ${answers[q.id]===true?"#B91C1C":"var(--bdr)"}`,background:answers[q.id]===true?"#B91C1C":"white",color:answers[q.id]===true?"white":"var(--tx2)",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",minWidth:48}}>Yes</button>
                    <button onClick={()=>setAnswers(a=>({...a,[q.id]:false}))} style={{padding:"8px 16px",borderRadius:"var(--r-sm)",border:`2px solid ${answers[q.id]===false?"var(--green)":"var(--bdr)"}`,background:answers[q.id]===false?"var(--green)":"white",color:answers[q.id]===false?"white":"var(--tx2)",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",minWidth:48}}>No</button>
                  </div>
                </div>
              </div>
            ))}
          </Card>
        </div>

        {/* Score panel */}
        <div>
          <Card sx={{background:totalScore>=3?"#FFF5F5":totalScore>=1?"#FFFBEB":"#ECFDF5",border:`2px solid ${riskColor}30`,marginBottom:18,position:"sticky",top:16}}>
            <h2 style={{fontSize:16,fontWeight:800,marginBottom:14}}>📊 Risk score</h2>
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:52,fontWeight:900,color:riskColor,lineHeight:1}}>{totalScore}</div>
              <div style={{fontSize:13,color:"var(--tx5)",marginBottom:12}}>out of 6</div>
              <Badge v={totalScore>=3?"red":totalScore>=1?"amber":"green"}>{riskLevel}</Badge>
            </div>
            <HR my={16}/>
            <div style={{fontSize:13,color:"var(--tx4)",marginBottom:12}}>Items endorsed:</div>
            {CSSRS_QUESTIONS.map(q=>(
              <div key={q.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
                <div style={{width:18,height:18,borderRadius:"50%",background:answers[q.id]?"#B91C1C":answers[q.id]===false?"var(--green)":"var(--bdr)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"white",flexShrink:0}}>{answers[q.id]?"✓":answers[q.id]===false?"✗":"?"}</div>
                <span style={{fontSize:12.5,color:"var(--tx4)"}}>{q.label}</span>
              </div>
            ))}
            <HR my={16}/>
            {totalScore>=3&&<Alert type="danger" style={{marginBottom:12}}><strong>Clinical action required.</strong> Implement safety plan immediately.</Alert>}
            <Btn v={totalScore>=3?"red":"pri"} full onClick={()=>{if(Object.keys(answers).length<6)return alert("Please answer all 6 questions before submitting.");setSubmitted(true);}}>Submit screening →</Btn>
            <div style={{fontSize:11.5,color:"var(--tx5)",textAlign:"center",marginTop:8}}>All questions must be answered before submitting</div>
          </Card>

          <Card>
            <h2 style={{fontSize:14,fontWeight:800,marginBottom:12}}>📚 Scoring guide</h2>
            {[["0","No ideation — continue monitoring"],["1–2","Low risk — safety planning recommended"],["3–4","High risk — immediate clinical review"],["5–6","Imminent risk — emergency intervention"]].map(([s,d])=>(
              <div key={s} style={{display:"flex",gap:10,marginBottom:9,alignItems:"flex-start"}}>
                <Badge v={parseInt(s)>=5?"red":parseInt(s)>=3?"red":parseInt(s)>=1?"amber":"green"} xs>{s}</Badge>
                <span style={{fontSize:12.5,color:"var(--tx4)"}}>{d}</span>
              </div>
            ))}
            <HR my={12}/>
            <p style={{fontSize:11.5,color:"var(--tx5)",lineHeight:1.5}}>Reference: Posner K, et al. The Columbia Suicide Severity Rating Scale: initial validity and internal consistency findings. Am J Psychiatry. 2011.</p>
          </Card>
        </div>
      </div>
    </div>
  );
};

const EHRPage = () => {

  const [running,setRunning]=useState(false);
  const [complete,setComplete]=useState(false);

    const interval=setInterval(()=>{
      if(i>=EHR_CRITERIA.length){clearInterval(interval);setRunning(false);setComplete(true);return;}
      const c=EHR_CRITERIA[i];
      setMatchStatus(s=>({...s,[c.id]:{status:Math.random()>.25?"matched":"partial",score:Math.floor(70+Math.random()*30)}}));
      i++;
    },120);
  };

  const matched=Object.values(matchStatus).filter(m=>m.status==="matched").length;
  const partial=Object.values(matchStatus).filter(m=>m.status==="partial").length;

  return (
    <div className="pg">

        <div>
          <Alert type="info" style={{marginBottom:18}}>
            <strong>FHIR Standards Used:</strong> HL7 FHIR R4 · SMART on FHIR OAuth 2.0 · US Core Implementation Guide · Alabama OHR InterSystems HealthShare · Epic on FHIR Showroom

          {/* EHR Systems */}

              {name:"Alabama One Health Record (OHR)",status:"Onboarding required",detail:"InterSystems HealthShare · Participation agreement required · epse2021.org for onboarding",color:"#047857",bg:"#ECFDF5"},
              {name:"ADMH Partner Network",status:"Via OHR aggregation",detail:"ADMH hospitals: Integrative CCP EHR · Community providers: varied · FHIR where available",color:"#5B21B6",bg:"#F5F3FF"},
              {name:"Google Cloud Healthcare API",status:"Configured",detail:"FHIR R4 store · Encrypted at rest · HIPAA BAA available",color:"#0C7A6A",bg:"#EDFAF6"},
              {name:"Microsoft Azure Health Data Services",status:"Configured",detail:"FHIR service · Azure AD B2C auth · Key Vault for secrets",color:"#92400E",bg:"#FEF3C7"},
            ].map(s=>(
              <div key={s.name} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 14px",borderRadius:"var(--r-sm)",border:`1px solid ${s.color}25`,background:s.bg,marginBottom:9}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:s.color,flexShrink:0,marginTop:4}}/>
                <div>
                  <div style={{fontSize:14,fontWeight:700,color:s.color}}>{s.name}</div>
                  <div style={{fontSize:12,color:"var(--tx5)",marginBottom:2}}>{s.detail}</div>
                  <Badge v="gray" xs>{s.status}</Badge>
                </div>
              </div>
            ))}
          </Card>

          {/* Demo patient */}
          <Card>
            <h2 style={{fontSize:15,fontWeight:800,marginBottom:14}}>👤 Demo patient — run matching</h2>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              {[["First name","Jordan"],["Last name","Thompson"],["Date of birth","2010-04-15"],["Medicaid ID","AL-2024-88732"],["Insurance","Alabama Medicaid / ALL Kids"],["ZIP code","35215"]].map(([l,v])=>(
                <div key={l}>
                  <label style={{display:"block",fontSize:13,fontWeight:700,color:"var(--tx4)",marginBottom:4}}>{l}</label>

              ))}
            </div>
            <Btn v="blue" full onClick={runMatch} disabled={running}>{running?"Running match…":"🔍 Run 21-criteria EHR match"}</Btn>
          </Card>
        </div>

        {/* Criteria table */}
        <div>
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <h2 style={{fontSize:15,fontWeight:800}}>📋 21 Matching criteria (FHIR-mapped)</h2>

            </div>
            {complete&&(
              <div style={{marginBottom:14}}>
                <Bar pct={(matched/21)*100} color={matched>=18?"var(--green)":matched>=12?"var(--amber)":"var(--red)"} h={10}/>

                        <td style={{padding:"9px 13px"}}>
                          {!s&&(running?<div style={{fontSize:12,color:"var(--tx5)"}}>⏳ Checking…</div>:<div style={{fontSize:12,color:"var(--tx5)"}}>—</div>)}
                          {s&&<Badge v={s.status==="matched"?"green":"amber"} xs>{s.status==="matched"?`✓ ${s.score}%`:`≈ Partial ${s.score}%`}</Badge>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      </div>
    </div>
  );
};

// ══════════════════════════════════════════════════════════
function App() {
  const [page,setPage]=useState("home");
  const [role,setRole]=useState("Admin");
  const mainRef=useRef(null);

  const nav=p=>{setPage(p);if(mainRef.current)mainRef.current.scrollTop=0;};
  const roleDefaults={Youth:"youth",Parent:"parent",School:"school",Provider:"provider",Admin:"coordinator"};
  const setRoleNav=r=>{setRole(r);nav(roleDefaults[r]||"home");};

  const routes={
    home:<Home nav={nav} setRole={setRoleNav}/>,
    youth:<YouthDash nav={nav}/>,
    journal:<JournalPage/>,
    parent:<ParentDash nav={nav}/>,
    school:<SchoolForm/>,
    provider:<ProviderDash nav={nav}/>,
    coordinator:<CoordDash nav={nav}/>,
    cssrs:<CSSRSPage/>,
    trauma:<TraumaPage/>,
    ehr:<EHRPage/>,
    consent:<ConsentPage/>,
    tracker:<TrackerPage/>,
    resources:<CrisisPage/>,
    appointments:<ApptPage/>,
    analytics:<AnalyticsPage/>,
  };

  return (
    <div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg)"}}>
      <Sidebar page={page} nav={nav} role={role}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
        <RoleBar role={role} setRole={setRoleNav} nav={nav}/>
        <main ref={mainRef} id="main-content" style={{flex:1,overflowY:"auto",padding:"28px 32px",background:"var(--bg)"}} tabIndex={-1} aria-label="Page content">
          {routes[page]||routes.home}
        </main>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
